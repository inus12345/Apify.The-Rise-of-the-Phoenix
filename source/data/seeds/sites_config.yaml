# The Rise of the Phoenix - Extended News Scraper Configuration
# Version 1 - All sites with LLM-ready spider graph metadata for structure drift detection

version: 1

sites:
  # Original 6 news sites (with enhanced div selectors for LLM drift detection)
  
  - name: BBC News
    url: https://www.bbc.com/news
    country: United Kingdom
    language: en
    description: Public broadcaster with broad global and local coverage.
    active: true
    num_pages_to_scrape: 4
    technologies:
      - name: Fastly
        type: cdn
      - name: Akamai Bot Manager
        type: waf
    scrape_strategy:
      scraper_engine: scrapling
      fallback_engine_chain: [pydoll, selenium]
      content_parser: beautifulsoup
      rendering_required: false
      anti_bot_protection: akamai
      rate_limit_per_minute: 30
    categories:
      - name: World
        url: https://www.bbc.com/news/world
        max_pages: 4
      - name: Business
        url: https://www.bbc.com/news/business
        max_pages: 3
      - name: Technology
        url: https://www.bbc.com/news/technology
        max_pages: 3
    div_selectors:
      article_title: ".__cls-story-body h1, .__article__content-headline a span"
      article_body: "p.story__lead-paragraph:not(:first-of-type)"
      publish_date: ".__published-datetime"
      author: "._author"
      image: "img.story-image"

  - name: BBC Sport
    url: https://www.bbc.com/sport
    country: United Kingdom
    language: en
    description: BBC Sport covering sports news and results
    active: true
    num_pages_to_scrape: 5
    technologies:
      - name: Fastly
        type: cdn
    scrape_strategy:
      scraper_engine: scrapling
