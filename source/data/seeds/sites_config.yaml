      content_parser: beautifulsoup
      rendering_required: false
      rate_limit_per_minute: 25
    categories:
      - name: Football
        url: https://www.bbc.com/sport/football
        max_pages: 4
      - name: Cricket
        url: https://www.bbc.com/sport/cricket
        max_pages: 3
      - name: Rugby
        url: https://www.bbc.com/sport/rugby-union
        max_pages: 3
    div_selectors:
      article_title: ".__cls-story-body h1"
      article_body: "p.story__lead-paragraph:not(:first-of-type)"
      publish_date: ".__published-datetime"
      author: "._author"

  - name: Reuters
    url: https://www.reuters.com/world/
    country: United States
    language: en
    description: Global wire service with high publication frequency.
    active: true
    num_pages_to_scrape: 5
    technologies:
      - name: Cloudflare
        type: cdn
    scrape_strategy:
      scraper_engine: scrapling
      fallback_engine_chain: [pydoll, selenium]
      content_parser: beautifulsoup
      rendering_required: true
      requires_proxy: true
      proxy_region: us
      anti_bot_protection: cloudflare
      blocking_signals: ["401 shield page", "access denied challenge"]
      bypass_techniques: ["residential_proxies", "browser_fingerprint", "session_cookies"]
      notes: Direct requests frequently return anti-bot shield pages without residential proxying.
      rate_limit_per_minute: 25
    categories:
      - name: World
        url: https://www.reuters.com/world/
        max_pages: 5
      - name: Business
        url: https://www.reuters.com/business/
        max_pages: 4
      - name: Technology
        url: https://www.reuters.com/technology/
        max_pages: 4
    div_selectors:
      article_title: ".story-header__content > h1, .article-title-link"
      article_body: ".story-body > p, .article-body-content p"
      publish_date: "._published-date, ._updated-date"
      author: "._author, ._contributor"

