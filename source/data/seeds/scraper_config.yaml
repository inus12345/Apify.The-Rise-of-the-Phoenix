# The Rise of the Phoenix - Scraper Configuration
# This configuration is now stored in data/seeds/ for scraper input purposes

default_mode: incremental
enable_full_scrape_mode: true
rate_limit_enabled: true
min_delay_between_requests: 1.0
default_batch_size: 200

scraping_settings:
  primary_engine: scrapling
  fallback_engines:
    - pydoll
    - selenium
  content_parser: beautifulsoup
  use_rate_limiting: true

rate_limiting:
  enabled: true
  delay_base_ms: 1000
  delay_range_multiplier: 0.5
  max_requests_per_minute: 60

retry_settings:
  max_retries: 3
  retry_delay_seconds: 2
  exponential_backoff: true

output_settings:
  preferred_format: json
  json_path: output/exports/scraped_articles.json
  auto_export: true

validation:
  enable_auto_validation: false
  sample_articles_to_validate: 0

database:
  max_articles_per_site: 10000
  enable_url_deduplication: true

user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"