version: 1

sites:
  - name: BBC News
    url: https://www.bbc.com/news
    country: United Kingdom
    language: en
    description: Public broadcaster with broad global and local coverage.
    active: true
    num_pages_to_scrape: 4
    technologies:
      - name: Fastly
        type: cdn
      - name: Akamai Bot Manager
        type: waf
    scrape_strategy:
      scraper_engine: scrapling
      fallback_engine_chain: [pydoll, selenium]
      content_parser: beautifulsoup
      rendering_required: false
      anti_bot_protection: akamai
      rate_limit_per_minute: 30
    categories:
      - name: World
        url: https://www.bbc.com/news/world
        max_pages: 4
      - name: Business
        url: https://www.bbc.com/news/business
        max_pages: 3
      - name: Technology
        url: https://www.bbc.com/news/technology
        max_pages: 3

  - name: Reuters
    url: https://www.reuters.com/world/
    country: United States
    language: en
    description: Global wire service with high publication frequency.
    active: true
    num_pages_to_scrape: 5
    technologies:
      - name: Cloudflare
        type: cdn
    scrape_strategy:
      scraper_engine: scrapling
      fallback_engine_chain: [pydoll, selenium]
      content_parser: beautifulsoup
      rendering_required: true
      requires_proxy: true
      proxy_region: us
      anti_bot_protection: cloudflare
      blocking_signals: ["401 shield page", "access denied challenge"]
      bypass_techniques: ["residential_proxies", "browser_fingerprint", "session_cookies"]
      notes: Direct requests frequently return anti-bot shield pages without residential proxying.
      rate_limit_per_minute: 25
    categories:
      - name: World
        url: https://www.reuters.com/world/
        max_pages: 5
      - name: Business
        url: https://www.reuters.com/business/
        max_pages: 4
      - name: Technology
        url: https://www.reuters.com/technology/
        max_pages: 4

