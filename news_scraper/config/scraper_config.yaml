# =============================================================================
# Scraper Configuration File for The Rise of the Phoenix News Scraper
# =============================================================================
# Use this YAML file to configure global scraping settings and behavior.
# 
# Usage:
#   1. Edit this file to customize scraper behavior globally
#   2. Run: python -m news_scraper.cli scrape --config=scraper_config.yaml
#   3. Settings here override defaults in core/config.py
# =============================================================================

# =============================================================================
# General Scaping Settings
# =============================================================================

scraping:
  # Default mode for scraping operations
  default_mode: incremental  # Options: "incremental", "backfill", or "full"
  
  # Enable full website scraping when --full flag is used (scrape homepage + all categories)
  enable_full_scrape_mode: true
  
  # Rate limiting settings
  rate_limit_enabled: true
  min_delay_between_requests: 1.0  # seconds between requests per domain
  
  # Number of pages to scrape by default for each category
  default_pages_to_scrape: 5

# =============================================================================
# Backfill Options (only used when mode="backfill")
# =============================================================================

backfill:
  # Date cutoff for historical scraping (null = no cutoff, go as far back as configured)
  date_cutoff: null  # Format: YYYY-MM-DD
  
  # Maximum number of pages to go deep for each site during backfill
  max_pages_per_site: 20

# =============================================================================
# Export Settings
# =============================================================================

export:
  # Default paths for exports (can be overridden per scrape)
  csv_path: ./data/exports/scraped_articles.csv
  json_path: ./data/exports/scraped_articles.json
  
  # Automatically export after each scrape job completes
  auto_export: false
  
  # Export format preference (optional)
  preferred_format: csv

# =============================================================================
# Validation Settings
# =============================================================================

validation:
  # Enable automatic validation checks after scraping
  enable_auto_validation: false
  
  # Number of sample articles to validate per site (0 = skip)
  sample_articles_to_validate: 0

# =============================================================================
# Database Settings
# =============================================================================

database:
  # Maximum number of articles to keep before archiving old ones
  max_articles_per_site: 10000
  
  # Enable deduplication via URL hash (always enabled by default)
  enable_url_deduplication: true

# =============================================================================
# Logging Settings
# =============================================================================

logging:
  level: INFO  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_file: ./data/scraping.log
  console_output: true  # Enable/disable console output

# =============================================================================
# User Agent Settings
# =============================================================================

user_agent:
  # Custom user agent string (optional - use default from settings.py if not specified)
  value: null  # Set to custom string like "Mozilla/5.0 (The-Rise-of-the-Phoenix/1.0; ..."

# =============================================================================
# SSL/TLS Settings
# =============================================================================

ssl:
  verify_ssl: true  # Enable/disable SSL verification
  ssl_timeout: 30  # Connection timeout in seconds